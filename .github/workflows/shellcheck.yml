name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ubuntu-latest does not always ship shellcheck on PATH — install explicitly.
      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck --version && shellcheck install.sh bin/wooven-publish
